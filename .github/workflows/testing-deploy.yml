name: Testing Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Type check web app
        working-directory: apps/web
        run: npm run type-check

  build-web:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build web app
        working-directory: apps/web
        env:
          VITE_USE_MOCK: 'true'
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          NODE_ENV: production
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: testing
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-api:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        working-directory: apps/api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service technobit-api

  announce-urls:
    runs-on: ubuntu-latest
    needs: [deploy-pages, deploy-api]
    if: always()
    steps:
      - name: Print deployment URLs
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║  🧪 TECHNOBIT — TESTING DEPLOYMENT COMPLETE      ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  🌐 https://${{ github.repository_owner }}.github.io/technogroup/"
          echo "║  🔌 https://technobit-api.railway.app/api"
          echo "║  📘 https://technobit-api.railway.app/api/docs"
          echo "║  ❤️  https://technobit-api.railway.app/api/health"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║  ⚠️  TESTING GRADE — not for production"
          echo "║  🌿 ${{ github.ref_name }} | 🔖 ${{ github.sha }}"
          echo "╚══════════════════════════════════════════════════╝"
